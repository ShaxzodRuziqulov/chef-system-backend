databaseChangeLog:
  - changeSet:
      id: 010-create-blogger-applications
      author: shaxzod
      changes:
        - createTable:
            tableName: blogger_applications
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_blogger_app_user
                    references: users(id)
              - column:
                  name: motivation
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: social_links
                  type: VARCHAR(500)
              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: PENDING
                  constraints:
                    nullable: false
              - column:
                  name: admin_note
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: NOW()
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: NOW()
              - column:
                  name: deleted
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
        - createIndex:
            indexName: idx_blogger_app_user
            tableName: blogger_applications
            columns:
              - column:
                  name: user_id
        - createIndex:
            indexName: idx_blogger_app_status
            tableName: blogger_applications
            columns:
              - column:
                  name: status
