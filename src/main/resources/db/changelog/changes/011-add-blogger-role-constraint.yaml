databaseChangeLog:
  - changeSet:
      id: 011-add-blogger-to-role-check
      author: shaxzod
      changes:
        - sql:
            sql: >
              ALTER TABLE users DROP CONSTRAINT IF EXISTS users_role_check;
              ALTER TABLE users ADD CONSTRAINT users_role_check
                CHECK (role IN ('ADMIN', 'BLOGGER', 'USER'));
            dbms: postgresql
