              -- 5) Bosqichlar
              INSERT INTO recipe_steps (recipe_id, step_number, instruction, image_url, duration_minutes)
              SELECT r.id, rs.step_number, rs.instruction, null, rs.duration_minutes
              FROM (
                  VALUES
                      ('Napoleon tort', 1, 'Sovuq sariyog‘ni (300 g) un (500 g) va tuz bilan qo‘lda mayda uvoqlarga ishqalang — sariyog‘ erimasligi uchun tez ishlang. Tuxum (2 dona) va muzdek suvni (150 ml) qo‘shib xamir qoring, 8-10 bo‘lakka bo‘lib, plyonkaga o‘rab, sovutgichda 1 soat tindiring.', 80),
                      ('Napoleon tort', 2, 'Har bir bo‘lakni yupqa (1-2 mm) doira qilib yoyib, 22-24 sm qolip bilan kesing. 190°C da 5-7 daqiqa oltin ranggacha pishiring — jami 10-12 qatlam. Qirqindilarni ham pishirib, bezak uchun maydalang.', 40),
                      ('Napoleon tort', 3, 'Krem: sutni (1 L) qaynating. Alohida idishda tuxum sarig‘i (4 dona), shakar (200 g) va un (60 g) ni aralashtiring. Qaynoq sutni ingichka oqim bilan quyib doimo aralashtiring, yana olovga qo‘yib qalinlashguncha (3-4 daqiqa) qaynating. Sariyog‘ va vanil qo‘shib, plyonka ostida sovuting.', 20),
                      ('Napoleon tort', 4, 'Har bir qatlamga 2-3 osh qoshiq krem surtib, bir-birining ustiga taxlang. Ustki qatlamni ham krem bilan yoping. Maydalangan qirqindilarni ust va yon tomonlarga sepib bezang.', 20),
                      ('Napoleon tort', 5, 'Sovutgichda kamida 8-12 soat (yaxshisi bir kecha) tindiring — qatlamlar kremni shimib yumshaydi. Kesishdan oldin 20 daqiqa xona haroratida ushlang.', 15),
                      ('Tiramisu', 1, 'Espressoni (250 ml) qaynatib, xona haroratiga sovuting. Xohlasangiz likyor (30 ml) qo‘shing.', 10),
                      ('Tiramisu', 2, 'Tuxum sarig‘ini (4 dona) shakar (120 g) bilan 5-7 daqiqa ko‘pik chiqquncha ishlov bering — massa oqarib, hajmi ikki barobar oshsin.', 7),
                      ('Tiramisu', 3, 'Maskarponeni (500 g) asta-sekin sarig‘ kremga qo‘shib, yumshoq silliqlashguncha aralashtiring — ortiqcha aralashtirmang, krem suyuladi.', 5),
                      ('Tiramisu', 4, 'Savoiardini (300 g) 2-3 soniya qahvaga botiring — ho‘l bo‘lsin, lekin ezilmasin. Idish tubiga bir qavat tering.', 10),
                      ('Tiramisu', 5, 'Ustiga kremning yarmini yoying (1.5-2 sm). Yana savoiardi qavati va qolgan krem. Kakaoni (30 g) elak orqali sepib, plyonka bilan yopib sovutgichda kamida 6 soat (yaxshisi bir kecha) tindiring.', 10),
                      ('Chak-chak', 1, 'Tuxumni (4 dona) tuz bilan ko‘pirtiring. Unni (400 g) asta qo‘shib, qattiqroq xamir qoring. 20 daqiqa tindiring.', 20),
                      ('Chak-chak', 2, 'Xamirni 3-4 mm qalinlikda yoyib, ingichka cho‘plar (4-5 mm enli, 2-3 sm uzun) qilib kesing.', 15),
                      ('Chak-chak', 3, 'Yog‘ni (500 ml) 170-180°C ga qizdiring. Cho‘plarni kichik bo‘laklab solib, oltin ranggacha (2-3 daqiqa) qovuring. Qog‘oz sochiqqa olib, yog‘ini singdiring.', 15),
                      ('Chak-chak', 4, 'Asal (300 g) va shakarni (100 g) qaynatib karamel hosil qiling — qoshiq bilan tubini qirganda chiziq qolsa tayyor (~118°C). Qovurilgan xamirni solib tez aralashtiring.', 10),
                      ('Chak-chak', 5, 'Asalga qoplangan xamirni yog‘langan idishga solib, qo‘lni ho‘llab istalgan shaklga keltiring. 2-3 soat qotishiga qo‘ying.', 15),
                      ('Baklava', 1, 'Yong‘oqni (400 g) blenderda yirik bo‘laklab maydalang. Sariyog‘ni (200 g) eriting. Duxovkani 180°C ga qizdiring.', 15),
                      ('Baklava', 2, 'Filo xamirni (500 g) tava o‘lchamida kesing. Tava tubiga bir qavat filo yoyib, eritilgan sariyog‘ surting; jami 8-10 qavat sariyog‘li filo tering.', 15),
                      ('Baklava', 3, 'Ustiga yong‘oq sepib, yana 4-5 qavat sariyog‘li filo yoting. O‘tkir pichoq bilan romb shaklida tubigacha kesing. Qolgan sariyog‘ni quyib, 35-40 daqiqa oltin ranggacha pishiring.', 40),
                      ('Baklava', 4, 'Sharbat: shakar (300 g), suv (200 ml) va limon sharbatini (30 ml) shakar eriguncha qaynating. Asal (50 g) va vanil qo‘shib, 5 daqiqa qaynatib biroz sovuting.', 10),
                      ('Baklava', 5, 'Issiq baklavaga iliq sharbatni quyib, 2-3 soat singguncha tindiring. So‘ng kesib torting.', 15),
                      ('Shokoladli brauni', 1, 'Duxovkani 175°C ga qizdiring. 20x20 sm tavani yog‘lab, pishirish qog‘ozi yoting.', 5),
                      ('Shokoladli brauni', 2, 'Qora shokolad (200 g) va sariyog‘ni (150 g) suv hammomida yoki mikroto‘lqinda eritib, biroz sovuting.', 5),
                      ('Shokoladli brauni', 3, 'Eritilgan shokoladga shakar (200 g) qo‘shib aralashtiring. Tuxumni (3 dona) birin-ketin solib, har birida yaxshilab aralashtiring. Vanil va tuz qo‘shing.', 5),
                      ('Shokoladli brauni', 4, 'Un (80 g) va kakaoni (30 g) elab, ortiqcha aralashtirmasdan qo‘shing.', 5),
                      ('Shokoladli brauni', 5, 'Aralashmani tavaga quyib, 22-25 daqiqa pishiring. Tayyorligini tekshirish: sanchqida nam bo‘lakchalar qolsin (quruq emas). Tavada to‘liq sovuting — shunda ichi qatqaloq bog‘laydi.', 25),
                      ('Halvo', 1, 'Qozonda sariyog‘ni (200 g) eritib, un (300 g) ni soling. O‘rtacha olovda to‘xtovsiz aralashtirib, un qovurilib jigarrang tus olguncha (10-12 daqiqa) qovuring.', 12),
                      ('Halvo', 2, 'Alohida idishda shakarni (250 g) suv (300 ml) bilan qaynatib sharbat tayyorlang.', 8),
                      ('Halvo', 3, 'Qovurilgan unga issiq sharbatni ehtiyotkorlik bilan (sachrashi mumkin) asta quyib, tez aralashtiring. Vanil qo‘shing.', 5),
                      ('Halvo', 4, 'Past olovda 3-5 daqiqa, yog‘ ajralguncha aralashtiring. Olovdan olib, qolipga solib yoki tekis yoyib tindiring.', 5),
                      ('Halvo', 5, 'Xona haroratida 30 daqiqa sovutgach, bo‘laklarga bo‘lib torting.', 30),
                      ('Krem-brule', 1, 'Duxovkani 150°C ga qizdiring. Vanil dukkagini bo‘yiga kesib, urug‘larini qaymoqqa (500 ml) soling va qaynatmasdan qaynash arafasiga keltiring. 15 daqiqa tindiring.', 20),
                      ('Krem-brule', 2, 'Tuxum sarig‘ini (5 dona) shakar (80 g) bilan oqarguncha ishlov bering. Vanilli qaymoqni ingichka oqim bilan quya turib doimo aralashtiring.', 10),
                      ('Krem-brule', 3, 'Ko‘pikni yig‘ib oling. Kremni 6 ta ramekinga quying. Tavaga qo‘yib, atrofiga ramekin yarmigacha qaynoq suv quying.', 5),
                      ('Krem-brule', 4, '150°C da 40-45 daqiqa pishiring — krem chetlari qotib, markazi sal tebransin. Sovutib, sovutgichda kamida 4 soat (yaxshisi bir kecha) tindiring.', 45),
                      ('Krem-brule', 5, 'Tortishdan 30 daqiqa oldin sovutgichdan oling. Har bir ustiga 1-2 choy qoshiq shakar (jami 60 g) sepib, gaz gorelka bilan oltin karamel hosil bo‘lguncha karamellashtiring. Darhol torting.', 5),
                      ('Medovik tort', 1, 'Suv hammomida sariyog‘ (80 g), asal (100 g) va shakarni (150 g) eritib aralashtiring. Soda (1 choy qoshiq) qo‘shing — massa ko‘pchiydi, bu normal. Biroz sovuting.', 10),
                      ('Medovik tort', 2, 'Tuxumni (3 dona) birin-ketin solib aralashtiring. Un (550 g) ni asta qo‘shib yumshoq xamir qoring. 8 ta teng bo‘lakka bo‘ling.', 15),
                      ('Medovik tort', 3, 'Har bo‘lakni pishirish qog‘ozida 22-24 sm o‘lchamda juda yupqa (2 mm) yoyib, 180°C da 5-7 daqiqa pishiring. Sovuting. Qirqindilarni maydalang.', 25),
                      ('Medovik tort', 4, 'Krem: smetana (800 g) ni quyuq qaymoq (200 ml) va shakar (150 g) bilan qalinlashguncha (5-7 daqiqa) ko‘pirtiring.', 7),
                      ('Medovik tort', 5, 'Har qatlamga mo‘l krem surtib taxlang. Ust va yon tomonlarni krem bilan yopib, maydalangan qirqindilar bilan bezang. Sovutgichda 8-12 soat tindiring.', 15),
                      ('Pechene qo‘rabo', 1, 'Sovuq sariyog‘ni (200 g) un (300 g), shakar kukuni (100 g) va tuz bilan qo‘lda tez uvoqlang. Tuxum sarig‘i (2 dona) va vanil qo‘shib tez xamir yig‘ing — ortiqcha qormang, pechene qattiq bo‘ladi.', 20),
                      ('Pechene qo‘rabo', 2, 'Xamirni 2 ta silindr qilib plyonkaga o‘rab, sovutgichda 1 soat (yoki muzlatgichda 20 daqiqa) tindiring. Duxovkani 180°C ga qizdiring.', 60),
                      ('Pechene qo‘rabo', 3, 'Silindrlarni 7-8 mm qalinlikda kesing yoki yoyib qoliplar bilan kesing. Pishirish qog‘oziga 2 sm oraliqda tering.', 10),
                      ('Pechene qo‘rabo', 4, '180°C da 12-15 daqiqa pishiring — chetlari oltin, markazi och bo‘lsa tayyor. Tavada 5 daqiqa sovutib, so‘ng panjaraga oling.', 15),
                      ('Panna cotta', 1, 'Jelatinni (10 g) sovuq suvda (50 ml) 5-10 daqiqa bo‘ktiring.', 10),
                      ('Panna cotta', 2, 'Qaymoq (400 ml) va sutni (100 ml) vanil dukkagi va shakar (70 g) bilan isiting — qaynatmang, 80°C yetarli. Vanil dukkagini olib tashlang.', 10),
                      ('Panna cotta', 3, 'Bo‘ktirilgan jelatinni issiq qaymoqqa solib to‘liq eriguncha aralashtiring. 50°C gacha sovuting.', 5),
                      ('Panna cotta', 4, 'Kremni 6 ta qolip yoki shisha idishga quying. Xona haroratida sovutib, sovutgichda kamida 4 soat qotishiga qo‘ying.', 10),
                      ('Panna cotta', 5, 'Tortishdan oldin meva sharbati (100 ml) yoki yangi meva bilan bezang. Qolipdan chiqarish uchun bir necha soniya issiq suvga botirib, tarelkaga ag‘daring.', 5),
                      ('Sho‘r non (Baget)', 1, 'Iliq suvga (350 ml, 35°C) shakar (5 g) va achitqi (7 g) solib, 10 daqiqa ko‘pik hosil bo‘lguncha tindiring.', 10),
                      ('Sho‘r non (Baget)', 2, 'Unga (500 g) tuz (10 g) qo‘shib, achitqili suvni quying va 10-12 daqiqa elastik xamir qoring. Yog‘langan idishda, plyonka ostida, issiq joyda 1 soat ikki barobar kattalashguncha tindiring.', 60),
                      ('Sho‘r non (Baget)', 3, 'Xamirni 2-3 teng bo‘lakka bo‘lib, har birini 30-35 sm baget shaklida cho‘zing. Pishirish qog‘oziga qo‘yib, 30-40 daqiqa yana ko‘tarilishiga qo‘ying.', 40),
                      ('Sho‘r non (Baget)', 4, 'Duxovkani 230°C ga qizdiring, pastiga suvli idish qo‘ying — bug‘ qatqaloqni ta‘minlaydi. Bagetni ko‘ndalang tilib, 20-25 daqiqa qovurilguncha pishiring.', 25),
                      ('Sho‘r non (Baget)', 5, 'Pishganini tekshirish: tagiga taqillating — bo‘sh ovoz chiqsa tayyor. Panjarada sovuting.', 10),
                      ('Qatlama pishloqli piroq', 1, 'Qatlama xamirni (500 g) xona haroratida 20-30 daqiqa eritib oling. Duxovkani 200°C ga qizdiring.', 30),
                      ('Qatlama pishloqli piroq', 2, 'Tvorog (300 g), maydalangan qattiq pishloq (150 g), tuxum (2 dona) va qaymoqni (100 ml) aralashtiring. Tuz va qora qalampir bilan ziravorlang.', 10),
                      ('Qatlama pishloqli piroq', 3, 'Xamirni ikkiga bo‘ling. Birini tava o‘lchamida yoyib, pishloqli ichlikni soling — chetdan 2 sm qoldiring. Ikkinchi qatlamni ustiga yoyib, chetlarini qisib yoping.', 10),
                      ('Qatlama pishloqli piroq', 4, 'Ustini 1 dona tuxum bilan moylab, vilka bilan bir necha joyidan teshing. 200°C da 25-30 daqiqa qovurilguncha pishiring.', 30),
                      ('Qatlama pishloqli piroq', 5, '10 daqiqa sovutib, issiq holida bo‘laklarga bo‘lib torting.', 10),
                      ('Shokoladli muffin', 1, 'Duxovkani 180°C ga qizdiring. Muffin qoliblariga qog‘oz kapsulalar joylang.', 5),
                      ('Shokoladli muffin', 2, 'Quruq masalliq: un (200 g), kakao (50 g), shakar (150 g), qabartma kukuni (10 g) va tuzni aralashtiring.', 5),
                      ('Shokoladli muffin', 3, 'Ho‘l masalliq: tuxum (2 dona), sut (150 ml) va o‘simlik yog‘ini (80 ml) alohida aralashtiring. Quruq masalliqqa quyib, ortiqcha aralashtirmasdan tez qo‘shing (mayda lumchalar qolsa bo‘ladi).', 5),
                      ('Shokoladli muffin', 4, 'Shokoladni (100 g) mayda bo‘laklang. Har qolipni 2/3 gacha xamir bilan to‘ldirib, markaziga 2-3 bo‘lak shokolad bosing.', 5),
                      ('Shokoladli muffin', 5, '180°C da 18-20 daqiqa pishiring. Sanchqi quruq chiqsa tayyor. 5 daqiqa qolipda, so‘ng panjarada sovuting.', 20),
                      ('Karamel flan', 1, 'Karamel: shakar (120 g) ni quruq qozonda o‘rtacha olovda, aralashtirmasdan, oltin-jigarrang karamelga aylanguncha eriting. Tezda qoliplarga quying — qotishidan oldin ishlang. Sovuting.', 10),
                      ('Karamel flan', 2, 'Duxovkani 160°C ga qizdiring. Sutni (500 ml) vanil bilan isiting (qaynatmang). Tuxum (3 dona) va tuxum sarig‘i (2 dona) ni shakar (100 g) va tuz bilan yengil aralashtiring (ko‘pirtirmang).', 10),
                      ('Karamel flan', 3, 'Iliq sutni tuxumli aralashmaga ingichka oqim bilan quya turib doimo aralashtiring. Ko‘pikni yig‘ib oling.', 5),
                      ('Karamel flan', 4, 'Kremni karamelli qoliplarga quying. Tavaga qo‘yib, atrofiga yarmigacha qaynoq suv quying. 160°C da 45-50 daqiqa pishiring — markazi tebransin.', 50),
                      ('Karamel flan', 5, 'Xona haroratida sovutib, sovutgichda kamida 4 soat (yaxshisi bir kecha) tindiring. Tortishdan oldin chetlarini pichoq bilan ajratib, tarelkaga ag‘daring — karamel ustiga oqadi.', 15),
                      ('Yer yong‘oqli halvo', 1, 'Qovurilgan yer yong‘oqni (400 g) blenderda yirik bo‘laklang — un bo‘lib ketmasin, donador qolsin.', 5),
                      ('Yer yong‘oqli halvo', 2, 'Qozonda shakar (200 g) va suvni (80 ml) qaynatib, 115-118°C (yoki bir tomchi sovuq suvda yumshoq to‘p hosil bo‘lguncha) karamel sharbat tayyorlang. Limon sharbati (10 ml) va tuz qo‘shing.', 15),
                      ('Yer yong‘oqli halvo', 3, 'Maydalangan yong‘oqni sharbatga solib tez aralashtiring. Massa qalinlashib, qozon chetidan ajray boshlasa tayyor.', 5),
                      ('Yer yong‘oqli halvo', 4, 'Yog‘langan idishga yoki pishirish qog‘oziga yoyib silliqlang. 1-2 sm qalinlik maqbul.', 5),
                      ('Yer yong‘oqli halvo', 5, 'Xona haroratida 1-2 soat qotishiga qo‘ying. Bo‘laklarga bo‘lib torting. Sovutgichda 1 haftagacha saqlanadi.', 60)
              ) AS rs(recipe_title, step_number, instruction, duration_minutes)
              JOIN recipes r ON r.title_uz = rs.recipe_title
              WHERE NOT EXISTS (
                  SELECT 1 FROM recipe_steps existing
                  WHERE existing.recipe_id = r.id AND existing.step_number = rs.step_number
              );

              -- 6) Ozuqaviy qiymat (har porsiya uchun; Excelda yetishmagan qiymatlar to‘ldirilgan)
              INSERT INTO nutritional_info (
                  recipe_id, calories_per_serving, protein_grams, fat_grams,
                  carbohydrate_grams, fiber_grams, sugar_grams, sodium_mg
              )
              SELECT r.id, n.calories, n.protein, n.fat, n.carbs, n.fiber, n.sugar, n.sodium
              FROM (
                  VALUES
                      ('Napoleon tort', 450, 7, 28, 44, 1, 26, 180),
                      ('Tiramisu', 430, 8, 30, 30, 0.5, 24, 90),
                      ('Chak-chak', 320, 5, 9, 56, 1, 34, 60),
                      ('Baklava', 290, 5, 18, 30, 1.5, 22, 70),
                      ('Shokoladli brauni', 230, 3, 14, 25, 1.5, 20, 80),
                      ('Halvo', 380, 4, 22, 42, 1, 28, 50),
                      ('Krem-brule', 430, 5, 38, 18, 0, 17, 55),
                      ('Medovik tort', 410, 6, 24, 44, 0.8, 30, 120),
                      ('Pechene qo‘rabo', 120, 1.5, 7, 13, 0.4, 5, 40),
                      ('Panna cotta', 330, 4, 27, 18, 0, 16, 45),
                      ('Sho‘r non (Baget)', 268, 8.4, 0.8, 55.2, 2.1, 0.4, 480),
                      ('Qatlama pishloqli piroq', 387, 14.3, 24.1, 28.6, 0.8, 1.2, 520),
                      ('Shokoladli muffin', 312, 5.1, 14.8, 41.2, 2.4, 24.6, 180),
                      ('Karamel flan', 285, 7.2, 14.5, 32.8, 0, 31.5, 90),
                      ('Yer yong‘oqli halvo', 250, 7, 14, 26, 2, 22, 40)
              ) AS n(recipe_title, calories, protein, fat, carbs, fiber, sugar, sodium)
              JOIN recipes r ON r.title_uz = n.recipe_title
              ON CONFLICT (recipe_id) DO NOTHING;
