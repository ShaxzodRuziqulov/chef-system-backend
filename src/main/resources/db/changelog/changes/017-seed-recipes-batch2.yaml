databaseChangeLog:
  - changeSet:
      id: 017-seed-recipes-batch2
      author: shaxzod
      comment: "Excel importi: 15 ta yangi shirinlik/pishiriq retsepti (Napoleon, Tiramisu, Baklava va h.k.) — masalliqlar, bosqichlar va ozuqaviy qiymat bilan. Matn tozalangan, dublikat masalliqlar birlashtirilgan, idempotent."
      changes:
        - sql:
            dbms: postgresql
            splitStatements: false
            stripComments: true
            sql: |
              -- 1) Yangi master masalliqlar (mavjudlari ON CONFLICT bilan o‘tkazib yuboriladi)
