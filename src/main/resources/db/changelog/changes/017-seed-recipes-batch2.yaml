              ON CONFLICT (name_uz) DO NOTHING;

              -- 2) Retseptlar (faqat title_uz hali mavjud bo‘lmasa qo‘shiladi)
              INSERT INTO recipes (
                  title_uz, title_ru, title_eng, description, prep_time_minutes, cook_time_minutes, servings,
                  difficulty_level, image_url, video_url, visible, deleted, view_count, average_rating, rating_count,
                  version, category_id, author_id, created_at, updated_at
              )
              SELECT recipe.title_uz, recipe.title_ru, recipe.title_eng, recipe.description, recipe.prep_time_minutes,
                     recipe.cook_time_minutes, recipe.servings, recipe.difficulty_level, null, null, true, false,
                     0, 0, 0, 0, c.id, u.id, now(), now()
              FROM (
                  VALUES
                      ('Napoleon tort', 'Торт Наполеон', 'Napoleon cake', 'Yupqa qatlamali krem tort — klassik Yevropa shirinligi.', 60, 30, 10, 'HARD', 'Shirinliklar'),
                      ('Tiramisu', 'Тирамису', 'Tiramisu', 'Savoiardi va maskarpone kremidan tayyorlanadigan italyan shirinligi.', 40, 0, 8, 'MEDIUM', 'Shirinliklar'),
                      ('Chak-chak', 'Чак-чак', 'Chak-chak', 'Asalga botirilgan qovurilgan xamir — o‘zbek milliy shirinligi.', 30, 20, 12, 'MEDIUM', 'Shirinliklar'),
                      ('Baklava', 'Пахлава', 'Baklava', 'Yong‘oq va asalli yupqa qatlamali sharq shirinligi.', 60, 40, 20, 'HARD', 'Shirinliklar'),
                      ('Shokoladli brauni', 'Шоколадные брауни', 'Chocolate brownies', 'Ichidan yumshoq, ustidan qatqaloq shokoladli keks.', 15, 25, 16, 'EASY', 'Shirinliklar'),
                      ('Halvo', 'Халва', 'Halva', 'Un yoki urug‘dan qaynatilgan o‘zbek milliy halvosi.', 10, 30, 8, 'MEDIUM', 'Shirinliklar'),
                      ('Krem-brule', 'Крем-брюле', 'Creme brulee', 'Vanilli krem ustida karamel qatlamli fransuz deserti.', 20, 45, 6, 'HARD', 'Shirinliklar'),
                      ('Medovik tort', 'Торт Медовик', 'Honey cake', 'Asal va smetana kremidan tayyorlanadigan ko‘p qatlamli tort.', 90, 25, 12, 'HARD', 'Shirinliklar'),
                      ('Pechene qo‘rabo', 'Песочное печенье', 'Shortbread cookies', 'Sariyog‘li, og‘izda eruvchi klassik pechene.', 20, 15, 24, 'EASY', 'Shirinliklar'),
                      ('Panna cotta', 'Панна котта', 'Panna cotta', 'Vanilli qaymoqdan tayyorlanadigan italyan jele deserti.', 15, 5, 6, 'EASY', 'Shirinliklar'),
                      ('Sho‘r non (Baget)', 'Французский багет', 'French baguette', 'Tashidan qatqaloq, ichidan yumshoq fransuz noni.', 20, 25, 2, 'MEDIUM', 'Pishiriqlar'),
                      ('Qatlama pishloqli piroq', 'Пирог с сыром', 'Cheese puff pastry', 'Pishloq va tuxumli qatlamali issiq piroq.', 30, 30, 8, 'MEDIUM', 'Pishiriqlar'),
                      ('Shokoladli muffin', 'Шоколадный маффин', 'Chocolate muffins', 'Ichidan suyuq shokoladli, tashidan yumshoq muffin.', 15, 20, 12, 'EASY', 'Shirinliklar'),
                      ('Karamel flan', 'Карамельный флан', 'Caramel flan', 'Karamel ustidagi sutli krem — ispan deserti.', 20, 50, 6, 'MEDIUM', 'Shirinliklar'),
                      ('Yer yong‘oqli halvo', 'Арахисовая халва', 'Peanut halva', 'Yer yong‘oq va shakardan tayyorlanadigan mazali halvo.', 10, 20, 10, 'EASY', 'Shirinliklar')
              ) AS recipe(title_uz, title_ru, title_eng, description, prep_time_minutes, cook_time_minutes, servings, difficulty_level, category_name)
              JOIN categories c ON c.name_uz = recipe.category_name
              JOIN users u ON u.username = 'admin'
              WHERE NOT EXISTS (SELECT 1 FROM recipes r WHERE r.title_uz = recipe.title_uz);

              -- 3) Teglar
              INSERT INTO recipe_tags (recipe_id, tag_id)
              SELECT r.id, t.id
              FROM (
                  VALUES
                      ('Napoleon tort', 'Bayramona'),
                      ('Tiramisu', 'Bayramona'),
                      ('Chak-chak', 'Bayramona'),
                      ('Baklava', 'Bayramona'),
                      ('Shokoladli brauni', 'Oson'), ('Shokoladli brauni', 'Tez'),
                      ('Krem-brule', 'Bayramona'),
                      ('Medovik tort', 'Bayramona'),
                      ('Pechene qo‘rabo', 'Oson'), ('Pechene qo‘rabo', 'Tez'),
                      ('Panna cotta', 'Tez'),
                      ('Qatlama pishloqli piroq', 'Bayramona'),
                      ('Shokoladli muffin', 'Tez'),
                      ('Karamel flan', 'Bayramona')
              ) AS rt(recipe_title, tag_name)
              JOIN recipes r ON r.title_uz = rt.recipe_title
              JOIN tags t ON t.name_uz = rt.tag_name
              ON CONFLICT DO NOTHING;

