              INSERT INTO recipes (
                  title_uz, title_ru, title_eng, description, prep_time_minutes, cook_time_minutes, servings,
                  difficulty_level, image_url, video_url, visible, deleted, view_count, average_rating, rating_count,
                  version, category_id, author_id, created_at, updated_at
              )
              SELECT recipe.title_uz, recipe.title_ru, recipe.title_eng, recipe.description, recipe.prep_time_minutes,
                     recipe.cook_time_minutes, recipe.servings, recipe.difficulty_level, null, null, true, false,
                     0, 0, 0, 0, c.id, u.id, now(), now()
              FROM (
                  VALUES
                      ('O‘zbek palovi', 'Узбекский плов', 'Uzbek pilaf', 'Sabzi, guruch va go‘shtdan tayyorlanadigan klassik palov.', 35, 90, 6, 'HARD', 'Milliy taomlar'),
                      ('Moshxo‘rda', 'Машхурда', 'Mung bean soup', 'Mosh, guruch va sabzavotli to‘yimli sho‘rva.', 20, 55, 5, 'MEDIUM', 'Sho‘rvalar'),
                      ('Shurpa', 'Шурпа', 'Shurpa', 'Go‘sht va yirik sabzavotlar bilan tayyorlanadigan tiniq sho‘rva.', 25, 80, 6, 'MEDIUM', 'Sho‘rvalar'),
                      ('Lag‘mon', 'Лагман', 'Lagman', 'Qo‘l cho‘zma xamir va sabzavotli qayla bilan tayyorlanadi.', 45, 60, 5, 'HARD', 'Milliy taomlar'),
                      ('Manti', 'Манты', 'Manti', 'Go‘shtli qiymadan bug‘da pishiriladigan xamir taomi.', 50, 45, 6, 'HARD', 'Milliy taomlar'),
                      ('Somsa', 'Самса', 'Samsa', 'Go‘sht va piyozli qatlama xamir pishirig‘i.', 40, 35, 8, 'MEDIUM', 'Pishiriqlar'),
                      ('Achchiq-chuchuk', 'Аччик-чучук', 'Achichuk salad', 'Pomidor, bodring va piyozdan tayyorlanadigan tez salat.', 15, 0, 4, 'EASY', 'Salatlar'),
                      ('Olivye salati', 'Салат оливье', 'Olivier salad', 'Kartoshka, tuxum, sabzi va tovuqli bayramona salat.', 25, 25, 6, 'EASY', 'Salatlar'),
                      ('Tovuq sho‘rva', 'Куриный суп', 'Chicken soup', 'Yengil, uy sharoitida tez tayyorlanadigan tovuq sho‘rva.', 15, 45, 5, 'EASY', 'Sho‘rvalar'),
                      ('Blinchik', 'Блинчики', 'Crepes', 'Sut, tuxum va undan tayyorlanadigan yupqa shirin blinchik.', 15, 20, 4, 'EASY', 'Shirinliklar')
              ) AS recipe(title_uz, title_ru, title_eng, description, prep_time_minutes, cook_time_minutes, servings, difficulty_level, category_name)
              JOIN categories c ON c.name_uz = recipe.category_name
              JOIN users u ON u.username = 'admin'
              WHERE NOT EXISTS (SELECT 1 FROM recipes r WHERE r.title_uz = recipe.title_uz);

              INSERT INTO recipe_tags (recipe_id, tag_id)
              SELECT r.id, t.id
              FROM (
                  VALUES
                      ('O‘zbek palovi', 'Oilaviy'), ('O‘zbek palovi', 'Bayramona'),
                      ('Moshxo‘rda', 'Foydali'), ('Moshxo‘rda', 'Oilaviy'),
                      ('Shurpa', 'Oilaviy'), ('Shurpa', 'Bayramona'),
                      ('Lag‘mon', 'Oilaviy'), ('Lag‘mon', 'Bayramona'),
                      ('Manti', 'Oilaviy'), ('Manti', 'Bayramona'),
                      ('Somsa', 'Oilaviy'), ('Somsa', 'Bayramona'),
                      ('Achchiq-chuchuk', 'Oson'), ('Achchiq-chuchuk', 'Tez'),
                      ('Olivye salati', 'Oson'), ('Olivye salati', 'Bayramona'),
                      ('Tovuq sho‘rva', 'Oson'), ('Tovuq sho‘rva', 'Foydali'),
                      ('Blinchik', 'Oson'), ('Blinchik', 'Tez')
              ) AS rt(recipe_title, tag_name)
              JOIN recipes r ON r.title_uz = rt.recipe_title
              JOIN tags t ON t.name_uz = rt.tag_name
              ON CONFLICT DO NOTHING;

