databaseChangeLog:
  - changeSet:
      id: 012-add-reset-token-to-users
      author: shaxzod
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: reset_token
                  type: VARCHAR(100)
                  constraints:
                    nullable: true
              - column:
                  name: reset_token_expiry
                  type: TIMESTAMP
                  constraints:
                    nullable: true
